# =============================================================================
# yamllint config — used by the lint workflow on every push and PR.
# -----------------------------------------------------------------------------
# Three of yamllint's defaults don't play well with GitHub Actions YAML, so
# we relax them here:
#
#   - line-length        — workflow files routinely have long `if:` expressions
#                          and inline shell. Wrapping them just hurts readability.
#   - truthy             — yamllint flags `on:` as "ambiguous truthy" because
#                          YAML 1.1 treats `on/off/yes/no` as booleans. GitHub
#                          Actions REQUIRES `on:` as the trigger key. Disable.
#   - document-start     — `---` at the top of every workflow is optional and
#                          we don't use it; no need to start flagging it now.
#
# Everything else stays at default — indentation, key duplicates, trailing
# spaces, etc. all still get checked.
# =============================================================================

extends: default

ignore: |
  .venv/
  __pycache__/
  node_modules/

rules:
  line-length: disable
  truthy: disable
  document-start: disable
  # Comments default to requiring a space after `#`; relax minimum spacing
  # since some commented-out lines preserve original indentation.
  comments:
    require-starting-space: true
    min-spaces-from-content: 1
  comments-indentation: disable
