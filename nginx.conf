server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------------------------------
    # Security Headers (mirrors .htaccess)
    # -----------------------------------------------------------------------
    # Server-level include for responses NOT served by a location with its
    # own add_header (e.g. error pages). The same snippet is also included
    # in every location below — nginx replaces (not merges) inherited
    # add_header when a location has any of its own.
    include /etc/nginx/conf.d/security-headers.conf;

    # Hide nginx version
    server_tokens off;

    # -----------------------------------------------------------------------
    # Compression (gzip for smaller transfer sizes)
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/xhtml+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/otf
        application/x-font-ttf
        application/x-font-opentype;

    # -----------------------------------------------------------------------
    # Custom error pages
    # -----------------------------------------------------------------------
    error_page 403 /403.html;
    error_page 404 /404.html;

    # -----------------------------------------------------------------------
    # Block sensitive files & directories
    # -----------------------------------------------------------------------

    # Block hidden files/dirs (.git, .env, .htaccess, etc.)
    location ~ /\. {
        include /etc/nginx/conf.d/security-headers.conf;
        deny all;
        return 403;
    }

    # Block scripts, markdown, config, and backup files
    location ~* \.(py|pyc|md|sh|bak|config|dist|fla|inc|ini|log|psd|sql|swp|swo)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        deny all;
        return 403;
    }

    # Allow specific JSON files needed by site JS / the browser:
    #   preview-mapping.json    -> resource preview thumbnails (main.js)
    #   manifest.json           -> PWA "Add to Home Screen" metadata
    #   meetings-search-index.json -> meetings.html full-text search
    location = /preview-mapping.json {
        include /etc/nginx/conf.d/security-headers.conf;
        default_type application/json;
    }
    location = /manifest.json {
        include /etc/nginx/conf.d/security-headers.conf;
        default_type application/json;
    }
    location = /meetings-search-index.json {
        include /etc/nginx/conf.d/security-headers.conf;
        default_type application/json;
    }

    # Block all other JSON files
    location ~* \.json$ {
        include /etc/nginx/conf.d/security-headers.conf;
        deny all;
        return 403;
    }

    # Pagefind search index. Generated fresh on every deploy by the
    # `npx pagefind` step in gcp-deploy.yml. The ^~ prefix modifier
    # makes this location win against the regex `\.json$` deny rule
    # above (nginx's regex locations don't run when a ^~ prefix
    # match is found), so pagefind-entry.json — which Pagefind loads
    # first to discover the index hash — is served instead of 403'd.
    #
    # The `types { }` block overrides nginx's inherited mime.types
    # for this location, so we re-declare the standard types we need
    # AND map Pagefind's custom extensions:
    #   .pagefind    — the WASM search runtime (application/wasm so
    #                  browsers can stream-compile it instead of
    #                  falling back to the slower ArrayBuffer path)
    #   .pf_meta     — language metadata
    #   .pf_index    — sharded inverted index
    #   .pf_fragment — content fragments shown in result cards
    location ^~ /_pagefind/ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";

        types {
            application/json       json;
            application/javascript js;
            text/css               css;
            application/wasm       pagefind;
            application/octet-stream pf_meta pf_index pf_fragment;
        }
        default_type application/octet-stream;
    }

    # Disable directory listing
    autoindex off;

    # -----------------------------------------------------------------------
    # Caching (mirrors .htaccess)
    # -----------------------------------------------------------------------

    # HTML — short cache
    location ~* \.html$ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # CSS & JS — long cache (cache-busted via ?v= param)
    location ~* \.(css|js)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images — long cache
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # XML files (sitemap, feed) — short cache, revalidate often
    location ~* \.xml$ {
        include /etc/nginx/conf.d/security-headers.conf;
        default_type application/xml;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # -----------------------------------------------------------------------
    # Redirect old /csoh/ paths to root
    # -----------------------------------------------------------------------
    location ^~ /csoh/ {
        include /etc/nginx/conf.d/security-headers.conf;
        rewrite ^/csoh/(.*)$ /$1 permanent;
    }
    location = /csoh {
        include /etc/nginx/conf.d/security-headers.conf;
        return 301 /;
    }

    # -----------------------------------------------------------------------
    # Default location
    # -----------------------------------------------------------------------
    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ =404;
    }
}
