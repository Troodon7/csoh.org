<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG image template</title>
<style>
  /* OG image canvas: 1200x630 is the Facebook/Twitter recommended size.
     We render at exactly that size so Playwright can screenshot it 1:1. */
  html, body {
    margin: 0;
    padding: 0;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #f5f7fa;
  }
  body {
    /* Diagonal CSOH brand gradient — matches the hero on the live site. */
    background:
      radial-gradient(circle at 85% 15%, rgba(231, 76, 60, 0.18) 0%, transparent 45%),
      linear-gradient(135deg, #1a2433 0%, #2c3e50 45%, #2980b9 100%);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    padding: 64px 72px;
    position: relative;
  }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .brand .logo {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #ffffff;
  }
  .brand .tagline {
    font-size: 18px;
    opacity: 0.7;
    color: #cbd5e1;
    font-weight: 500;
  }
  .badge {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.18);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    color: #cbd5e1;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .main {
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 1056px;
  }
  .accent-bar {
    width: 64px;
    height: 6px;
    background: #e74c3c;
    border-radius: 3px;
  }
  h1 {
    font-size: 64px;
    line-height: 1.1;
    margin: 0;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #ffffff;
    /* Long titles need to fit; cap to ~3 lines. */
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  h1.size-md { font-size: 56px; }
  h1.size-sm { font-size: 48px; }
  .subtitle {
    font-size: 26px;
    line-height: 1.35;
    color: #e2e8f0;
    opacity: 0.85;
    font-weight: 400;
    max-width: 980px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    color: #94a3b8;
    font-size: 18px;
  }
  .footer .url {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .footer .meta {
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="top-bar">
  <div class="brand">
    <span class="logo">CSOH</span>
    <span class="tagline">Cloud Security Office Hours</span>
  </div>
  <span class="badge" id="badge">Practitioner Guide</span>
</div>
<div class="main">
  <div class="accent-bar"></div>
  <h1 id="title">Page title goes here</h1>
  <div class="subtitle" id="subtitle">Subtitle / one-line value prop goes here.</div>
</div>
<div class="footer">
  <span class="url">csoh.org</span>
  <span class="meta">Vendor-neutral · 2,000+ practitioners · Friday Zoom 7am PT</span>
</div>
<script>
  // The Python generator passes ?title=...&subtitle=...&badge=... so this
  // template can render any page's OG image without per-page HTML files.
  const params = new URLSearchParams(location.search);
  const setIf = (id, key) => {
    const v = params.get(key);
    if (v !== null) document.getElementById(id).textContent = v;
  };
  setIf('title', 'title');
  setIf('subtitle', 'subtitle');
  setIf('badge', 'badge');
  // Auto-shrink title font if very long (rough char-based heuristic that
  // matches the line-clamp visual better than measuring layout).
  const title = document.getElementById('title');
  const len = title.textContent.length;
  if (len > 60) title.classList.add('size-sm');
  else if (len > 40) title.classList.add('size-md');
</script>
</body>
</html>
