# Security headers, factored out so they can be `include`d in every
# location block. nginx's add_header is REPLACED (not inherited) by any
# location block that has its own add_header — without this snippet,
# adding a Cache-Control header in a location wipes out HSTS/CSP/etc.
#
# Sourced into nginx.conf via `include`. Keep this file in sync with the
# corresponding .htaccess rules.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options    "nosniff" always;
add_header X-Frame-Options           "DENY" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
# script-src includes 'wasm-unsafe-eval' so /search.html's Pagefind UI
# can stream-compile its WebAssembly search runtime. Without this token,
# Chromium-based browsers block WebAssembly.instantiate() under a strict
# CSP and the search index never loads. 'wasm-unsafe-eval' is the narrow
# CSP3 token that allows WASM only — it does NOT re-enable eval() or
# inline scripts, so the surrounding hardening (no 'unsafe-inline', no
# 'unsafe-eval') is preserved.
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' https://csoh.org https://img.youtube.com https://i.ytimg.com data:; font-src 'self'; connect-src 'self'; frame-src https://www.youtube.com https://web.archive.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
add_header Cross-Origin-Opener-Policy   "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
