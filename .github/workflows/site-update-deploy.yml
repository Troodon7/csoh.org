# =============================================================================
# Update SRI, Generate Previews, and Deploy
# -----------------------------------------------------------------------------
# The big one. Runs on every push to main that touches site files. Walks
# through a sequence of housekeeping steps (SRI hashes, URL safety, URL
# normalization, presentations schema, sitemap dates, preview screenshots),
# committing each one back to main if anything changed. Then mirrors the
# whole tree to the FTP server.
#
# Each step that commits-and-pushes uses
#     git push || (git pull --rebase origin main && git push)
# so that if another deploy-pipeline workflow pushed a commit while this one
# was working, this run rebases on top and tries again instead of failing.
# =============================================================================

name: Update SRI, Generate Previews, and Deploy

on:
  # Auto-run on every push to main, but ONLY when one of the listed file
  # patterns changed. Editing tools/ or docs alone won't trigger a deploy.
  push:
    branches:
      - main
    paths:
      - '*.html'
      - 'chat-screenshots/**'
      - 'img/**'
      - 'style.css'
      - 'main.js'
      - 'chat-resources.js'
      - 'breach-timeline.css'
      - 'breach-timeline.js'
      - 'update_sri.py'
      - '.htaccess'
  # Manual trigger from the Actions tab. The `full_deploy` input is purely
  # cosmetic right now — kept for compatibility with the older Actions UI.
  workflow_dispatch:
    inputs:
      full_deploy:
        description: 'Force a full mirror deploy'
        required: false
        default: 'true'

# Read-only on the auto-injected GITHUB_TOKEN. Every step that pushes
# commits (SRI, sitemap, previews, etc.) uses an installation token minted
# from the csoh-ci GitHub App, and the FTP deploy uses secrets.FTP_*. The
# default token only needs to clone the repo.
permissions:
  contents: read

# Shared concurrency group across all workflows that push commits to main
# or run an FTP deploy: site-update-deploy, manual-deploy, update-news,
# normalize-urls. They queue serially rather than racing.
#
# cancel-in-progress: true (deploy only) — if a newer deploy is queued while
# an older one is running, cancel the older one. This prevents the stale-
# content race where update-news's auto-merge triggers a fresh deploy while
# the pre-merge deploy is still mid-flight publishing the older state. Update
# News and other group members keep cancel-in-progress: false elsewhere.
concurrency:
  group: deploy-pipeline
  cancel-in-progress: true

jobs:
  update-sri-and-previews:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived (~1h) installation token from the csoh-ci GitHub
      # App. Replaces the long-lived PAT_TOKEN we used to use here. We need a
      # non-default token (not the auto-injected GITHUB_TOKEN) because the
      # housekeeping steps below push commits to main and we want those to
      # trigger downstream workflows — GITHUB_TOKEN-authored commits do not.
      # The App is on the main-branch ruleset bypass list, so direct pushes
      # from this workflow are accepted.
      - name: Mint installation token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          # `client-id` (the Iv23.* string from the App's settings page) —
          # the older `app-id` (numeric App ID) was deprecated in v3.x.
          client-id: ${{ secrets.CSOH_CI_CLIENT_ID }}
          private-key: ${{ secrets.CSOH_CI_PRIVATE_KEY }}

      # App-authenticated full clone. fetch-depth: 0 = no shallow clone, so
      # `git diff` and `git log` see full history (needed for the mtime
      # restore step and the diff-against-original-SHA checks below).
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      # Remember the commit SHA we started from. Later steps push new commits
      # and we want to compare against THIS sha (not HEAD) to know what the
      # original push actually changed.
      - name: Save original commit SHA
        id: original_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # A fresh `actions/checkout` gives every file the SAME mtime — the
      # moment of the checkout. lftp's `mirror` decides what to upload
      # based on size + mtime; if every local file looks "new" relative to
      # the server, lftp re-uploads literally everything every run.
      #
      # Fix: rewind each file's mtime to the date of its last git commit.
      # Files we DON'T touch this run keep their historical mtime → lftp
      # sees they match the server and skips them. Files the housekeeping
      # steps below modify (SRI rewrites, sitemap, previews) get a fresh
      # "now" mtime → lftp sees they're newer than the server and uploads
      # only those.
      #
      # Result: the deploy uploads only what actually changed, not the
      # whole tree. Saves a couple of minutes per run and a lot of FTP
      # round-trips on the host.
      - name: Restore file mtimes from git history
        run: |
          # `ls-files -z` = NUL-terminated paths (handles spaces in names)
          # `git log -1 --format=%ct -- <file>` = unix timestamp of last commit
          # `touch -d @<unix>` = set file's modification time
          git ls-files -z | while IFS= read -r -d '' file; do
            ts=$(git log -1 --format=%ct -- "$file" 2>/dev/null)
            [ -n "$ts" ] && touch -d "@$ts" "$file"
          done

      # Install Python — most of the housekeeping scripts are Python.
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.x'

      # Install Playwright + Pillow (used by generate_preview.py to capture
      # and resize screenshots) plus a headless Chromium binary.
      - name: Install dependencies
        run: |
          pip install playwright Pillow
          playwright install chromium

      # --- SRI hashes are always updated and committed BEFORE any deploy step ---
      # SRI = Subresource Integrity. Each <script> and <link rel="stylesheet">
      # tag carries a sha384 hash of the file it loads; browsers refuse to
      # execute the file if the hash mismatches. We recompute these hashes
      # whenever style.css or main.js changes, otherwise the page breaks.
      - name: Update SRI hashes in HTML files (MUST RUN BEFORE DEPLOY)
        id: sri
        run: |
          python3 update_sri.py
          # `git diff --quiet` exits 0 if there's nothing changed, 1 if there is.
          if git diff --quiet; then
            # Set a step output so later steps can ask "did SRI change?"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No SRI changes to commit"
          else
            # Configure git as the bot identity, then commit & push.
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            # `*.html` is shell-globbed by git itself; commit ONLY HTML files.
            git add '*.html'
            # `[skip ci]` in a commit message tells GitHub Actions NOT to
            # trigger workflows on this commit — avoids a deploy loop.
            git commit -m "chore: update SRI hashes for CSS/JS files [skip ci]"
            # If push fails (race with another deploy-pipeline run), pull
            # with rebase and retry. See file header for context.
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "SRI changes committed"
          fi

      # Validate every URL in our HTML against safety lists. We block the
      # whole deploy if anything unsafe slipped through — this is the
      # deploy-time equivalent of the per-PR check.
      - name: Check URL safety (must pass before normalization)
        id: url_safety
        run: |
          python3 tools/check_all_site_urls.py > url-safety-report.txt 2>&1 || true
          cat url-safety-report.txt
          if grep -q "❌ UNSAFE" url-safety-report.txt; then
            # `::error::` makes GitHub Actions render this as a red error
            # annotation in the run summary.
            echo "::error::Unsafe URLs detected — blocking normalization and deploy"
            echo "safe=false" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "safe=true" >> "$GITHUB_OUTPUT"
          fi

      # Save the safety report so reviewers can read it. `if: always()` =
      # upload even if the previous step failed (that's exactly when we
      # most want the report).
      - name: Upload safety report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: deploy-url-safety-report
          path: url-safety-report.txt
          retention-days: 30
          if-no-files-found: warn

      # Strip tracking params and resolve redirects on every URL. Same logic
      # as the standalone normalize-urls workflow, but runs inline so changes
      # ride along with the same deploy instead of opening a PR.
      - name: Normalize URLs (strip tracking params, resolve redirects)
        id: normalize
        run: |
          # `tee` writes output to a file AND prints it. PIPESTATUS[0] is
          # the exit code of the FIRST command in the pipe (Python), not tee.
          python3 tools/normalize_urls.py --apply 2>&1 | tee normalize-output.txt
          NORM_EXIT=${PIPESTATUS[0]}
          # Exit code 2 from normalize_urls.py = a redirect went to an
          # unsafe destination. Don't deploy; surface as a hard error.
          if [ "$NORM_EXIT" -eq 2 ]; then
            echo "::error::Normalization detected redirects to unsafe destinations — blocking deploy"
            exit 1
          fi
          # Other nonzero exits are warnings (couldn't resolve some URLs);
          # `::warning::` shows them as yellow annotations but doesn't fail.
          if [ "$NORM_EXIT" -ne 0 ]; then
            echo "::warning::URL normalization exited with code $NORM_EXIT — some redirects may not have been resolved"
          fi
          # Scope the diff check to HTML files only — other steps (URL safety)
          # may leave report files modified, but we only want to commit HTML
          # changes here. Without this scope, an empty `git add '*.html'`
          # followed by `git commit` fails under `bash -e` and blocks deploy.
          if git diff --quiet -- '*.html'; then
            echo "No URL changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add '*.html'
            git commit -m "chore: normalize URLs (tracking params, redirects) [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # presentations.html embeds JSON-LD VideoObject schema for each YouTube
      # talk. This script regenerates that block from the cards on the page,
      # so when you add a presentation the schema follows automatically.
      - name: Refresh presentations VideoObject schema
        id: presentations_schema
        run: |
          python3 tools/update_presentations_schema.py
          # Only commit if presentations.html actually changed.
          if git diff --quiet -- presentations.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No presentations schema changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add presentations.html
            git commit -m "chore: refresh presentations VideoObject schema [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Presentations schema changes committed"
          fi

      # Rebuild the meetings full-text search index. The meetings.html
      # search input lazily fetches /meetings-search-index.json so users
      # can match against the FULL recap body (speakers, topics buried in
      # the prose) and not just the card summaries.
      - name: Rebuild meetings search index
        id: meetings_search
        run: |
          python3 tools/build_meetings_search_index.py
          if git diff --quiet -- meetings-search-index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No meetings search index changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add meetings-search-index.json
            git commit -m "chore: rebuild meetings search index [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Meetings search index changes committed"
          fi

      # Refresh the <lastmod> dates in sitemap.xml from each file's git
      # commit date. Search engines use these to decide what to re-crawl.
      - name: Refresh sitemap lastmod dates
        id: sitemap
        run: |
          python3 tools/update_sitemap.py
          if git diff --quiet -- sitemap.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No sitemap changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sitemap.xml
            git commit -m "chore: refresh sitemap lastmod dates [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Sitemap changes committed"
          fi

      # Look for resource cards on the site that don't yet have a preview
      # screenshot. Sets a step output so the next two steps know whether
      # to actually generate them.
      - name: Check for missing previews
        id: check_previews
        run: |
          # `|| true` — don't fail this step if the script exits nonzero;
          # we just want the report to grep.
          python3 tools/generate_preview.py --check > preview-check.txt || true
          if grep -q "Found.*resources without previews" preview-check.txt; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Found resources without previews"
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "All resources have previews"
          fi
          cat preview-check.txt

      # Headless-Chromium screenshot every URL that's missing a preview.
      # Conditional — only runs if the previous step found something missing.
      - name: Generate missing previews
        if: steps.check_previews.outputs.missing == 'true'
        run: |
          python3 tools/generate_preview.py --batch-auto

      # Squeeze the new JPGs (strip metadata, recompress at quality 85).
      # Saves a noticeable amount of bandwidth on the live site.
      - name: Optimize images
        if: steps.check_previews.outputs.missing == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y jpegoptim
          # `find ... -exec`: run jpegoptim once per file. `\;` ends the
          # -exec command (not `\+` because we want one-at-a-time output).
          find img/previews -name "*.jpg" -exec jpegoptim --strip-all --max=85 {} \;

      # Commit and push the new preview JPGs + the mapping file. We swap the
      # remote URL to use a token-authenticated form because the App token
      # we minted at the top of the job has permissions the default origin
      # doesn't (and triggers downstream workflows on the resulting commit).
      - name: Commit and push preview images
        if: steps.check_previews.outputs.missing == 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Rewrite the origin URL to embed the App token for HTTPS push auth.
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          # `|| true` lets the step continue if there are no JPGs to add.
          git add img/previews/*.jpg || true
          git add preview-mapping.json || true
          # `git diff --cached --quiet` checks the staging area: nothing to
          # commit means we just exit cleanly.
          if git diff --cached --quiet; then
            echo "No preview images to commit"
          else
            git commit -m "chore: auto-generate preview images for new resources [skip ci]"
            git push || (git pull --rebase origin main && git push)
          fi

      # Did the original push (the one that triggered this workflow) include
      # any chat-screenshots? Sets a flag the deploy step uses to decide
      # whether to upload the chat-screenshots/ directory.
      - name: Check for new chat-screenshots
        id: check_chat_screenshots
        run: |
          ORIG_SHA="${{ steps.original_sha.outputs.sha }}"
          # `${ORIG_SHA}^` = the parent of the original commit. Diff between
          # that and the original commit shows what THIS push introduced.
          if git diff --name-only "${ORIG_SHA}^" "${ORIG_SHA}" -- 'chat-screenshots/' | grep -q .; then
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "New chat-screenshots detected"
          else
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "No new chat-screenshots"
          fi

      # Same shape as above but for HTML files. Used by the deploy gate.
      - name: Check if HTML content changed
        id: html_changed
        run: |
          ORIG_SHA="${{ steps.original_sha.outputs.sha }}"
          if git diff --name-only "${ORIG_SHA}^" "${ORIG_SHA}" -- '*.html' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # .htaccess is server config — when it changes (CSP rule tweak, new
      # rewrite rule, etc.) we MUST redeploy or the live site keeps using
      # the stale config. The HTML-only check above misses this.
      - name: Check if .htaccess changed
        id: htaccess_changed
        run: |
          ORIG_SHA="${{ steps.original_sha.outputs.sha }}"
          if git diff --name-only "${ORIG_SHA}^" "${ORIG_SHA}" -- '.htaccess' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Decide whether the FTP deploy actually needs to run. We deploy when
      # ANY of these are true:
      #   - SRI hashes changed
      #   - sitemap was refreshed
      #   - previews were generated
      #   - new chat-screenshots
      #   - any HTML changed
      #   - .htaccess changed (server config — must push to live)
      #   - manual workflow_dispatch trigger
      # If none of the above, we skip the deploy entirely — saves the FTP
      # bandwidth and surface area for nothing-to-do runs.
      - name: Check if deploy is needed
        id: deploy_needed
        run: |
          if [[ "${{ steps.sri.outputs.changed }}" == "true" || "${{ steps.sitemap.outputs.changed }}" == "true" || "${{ steps.check_previews.outputs.missing }}" == "true" || "${{ steps.check_chat_screenshots.outputs.new }}" == "true" || "${{ steps.html_changed.outputs.changed }}" == "true" || "${{ steps.htaccess_changed.outputs.changed }}" == "true" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      # Install lftp only if we're actually going to deploy.
      - name: Install lftp
        if: steps.deploy_needed.outputs.deploy == 'true'
        run: sudo apt-get update && sudo apt-get install -y lftp

      # The actual FTP deploy. Uploads the site to the live server.
      - name: Deploy to FTP
        if: steps.deploy_needed.outputs.deploy == 'true'
        # Hard cap so a hung lftp doesn't burn the 6-hour job budget.
        timeout-minutes: 20
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # net:timeout      — fail any operation stuck >30s instead of hanging
          # net:max-retries  — try twice then give up rather than retrying forever
          # net:idle         — close idle control connections after 30s
          # ssl:* / ftp:ssl  — preserved from the previous config
          LFTP_CONN="set net:timeout 30; \
                     set net:max-retries 2; \
                     set net:reconnect-interval-base 5; \
                     set net:idle 30; \
                     set ssl:verify-certificate no; \
                     set ftp:ssl-force true; \
                     set ftp:ssl-protect-data true; \
                     open -u ${FTP_USER},${FTP_PASS} ${FTP_HOST}"
          # --parallel=2 is gentler on hosts that throttle concurrent transfers;
          # the previous --parallel=4 stalled mid-mirror in late April 2026.

          # Pass 1: site files. `mirror -R` = REVERSE mirror (local → remote).
          # We exclude img/ and chat-screenshots/ because we sync those in
          # dedicated passes below — they have their own rules and timing.
          # The other --exclude rules drop dev-only files (.git, README, etc.)
          # that don't belong on the public server.
          echo "==> Deploying site files..."
          lftp -e "${LFTP_CONN}; mirror -R ./ /public_html/ --verbose=2 --parallel=2 \
            --exclude .git/ --exclude .github/ --exclude .venv/ --exclude __pycache__/ \
            --exclude img/ --exclude chat-screenshots/ \
            --exclude-glob *.sh --exclude-glob *.pyc --exclude-glob *.pyo \
            --exclude README.md --exclude CONTRIBUTING.md \
            --exclude CONTRIBUTING_RESOURCES.md --exclude LICENSE \
            --exclude-glob .DS_Store --exclude tools/; bye"
          # Pass 2: always sync img/previews/. lftp mirror only uploads changed
          # files, so it's fast when nothing changed and catches any stale
          # images on the server that were regenerated in the repo without
          # triggering a `missing` signal.
          echo "==> Syncing preview images..."
          lftp -e "${LFTP_CONN}; mirror -R ./img/previews/ /public_html/img/previews/ --verbose=2 --parallel=2 \
            --exclude-glob .DS_Store; bye"
          # Pass 3: always sync news source banners (small, static set of ~19 images)
          echo "==> Syncing news banners..."
          lftp -e "${LFTP_CONN}; mirror -R ./img/news-banners/ /public_html/img/news-banners/ --verbose=2 --parallel=2 \
            --exclude-glob .DS_Store; bye"
          # Pass 3.5: always sync per-page social share images referenced by og:image meta tags
          echo "==> Syncing OG/social share images..."
          lftp -e "${LFTP_CONN}; mirror -R ./img/og/ /public_html/img/og/ --verbose=2 --parallel=2 \
            --exclude-glob .DS_Store; bye"
          # Pass 3a: always sync author bio photos (very small, rarely changes)
          echo "==> Syncing author photos..."
          lftp -e "${LFTP_CONN}; mirror -R ./img/authors/ /public_html/img/authors/ --verbose=2 --parallel=2 \
            --exclude-glob .DS_Store; bye"
          # Pass 3b: always sync PWA icons referenced by manifest.json
          echo "==> Syncing PWA icons..."
          lftp -e "${LFTP_CONN}; mirror -R ./img/icons/ /public_html/img/icons/ --verbose=2 --parallel=2 \
            --exclude-glob .DS_Store; bye"
          # Pass 3c: always sync per-page Pexels-sourced photos used in <picture>
          # blocks across pillar / community / listing pages.
          echo "==> Syncing page photos..."
          lftp -e "${LFTP_CONN}; mirror -R ./img/photos/ /public_html/img/photos/ --verbose=2 --parallel=2 \
            --exclude-glob .DS_Store; bye"
          # Pass 4: only sync chat-screenshots/ when new ones were added this run
          # (they're large; skip the full mirror when nothing changed).
          if [[ "${{ steps.check_chat_screenshots.outputs.new }}" == "true" ]]; then
            echo "==> Syncing new chat-screenshots..."
            lftp -e "${LFTP_CONN}; mirror -R ./chat-screenshots/ /public_html/chat-screenshots/ --verbose=2 --parallel=2 \
              --exclude-glob .DS_Store; bye"
          else
            echo "==> No new chat-screenshots to sync, skipping."
          fi
          echo "==> Deploy complete."
