# =============================================================================
# Site housekeeping — SRI hashes, URL safety, sitemap, preview images
# -----------------------------------------------------------------------------
# Runs on every push to main that touches site files. Walks through a
# sequence of housekeeping steps (SRI hashes, URL safety, URL normalization,
# presentations schema, sitemap dates, preview screenshots), committing each
# one back to main if anything changed. The actual deploy to production is
# done by `gcp-deploy.yml` — this workflow only does the housekeeping that
# belongs upstream of the deploy.
#
# Each step that commits-and-pushes uses
#     git push || (git pull --rebase origin main && git push)
# so that if another workflow pushed a commit while this one was working,
# this run rebases on top and tries again instead of failing.
#
# The downstream gcp-deploy.yml is triggered by the housekeeping commits
# this workflow pushes (since they're authored by the csoh-ci App, not the
# default GITHUB_TOKEN, so they trigger downstream workflows correctly).
# =============================================================================

name: Site Housekeeping (SRI, sitemap, previews)

on:
  # Auto-run on every push to main, but ONLY when one of the listed file
  # patterns changed. Editing tools/ or docs alone won't trigger a run.
  push:
    branches:
      - main
    paths:
      - '*.html'
      - 'chat-screenshots/**'
      - 'img/**'
      - 'style.css'
      - 'main.js'
      - 'chat-resources.js'
      - 'breach-timeline.css'
      - 'breach-timeline.js'
      - 'update_sri.py'
  # Manual trigger from the Actions tab.
  workflow_dispatch:

# Read-only on the auto-injected GITHUB_TOKEN. Every step that pushes
# commits (SRI, sitemap, previews, etc.) uses an installation token minted
# from the csoh-ci GitHub App. The default token only needs to clone the repo.
permissions:
  contents: read

# Shared concurrency group across all workflows that push commits to main:
# site-update-deploy, update-news, normalize-urls. They queue serially
# rather than racing.
#
# cancel-in-progress: true — if a newer push is queued while an older
# housekeeping run is in flight, cancel the older one so we don't push
# stale SRI/sitemap state on top of a newer base.
concurrency:
  group: deploy-pipeline
  cancel-in-progress: true

jobs:
  update-sri-and-previews:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived (~1h) installation token from the csoh-ci GitHub
      # App. Replaces the long-lived PAT_TOKEN we used to use here. We need a
      # non-default token (not the auto-injected GITHUB_TOKEN) because the
      # housekeeping steps below push commits to main and we want those to
      # trigger downstream workflows — GITHUB_TOKEN-authored commits do not.
      # The App is on the main-branch ruleset bypass list, so direct pushes
      # from this workflow are accepted.
      - name: Mint installation token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          # `client-id` (the Iv23.* string from the App's settings page) —
          # the older `app-id` (numeric App ID) was deprecated in v3.x.
          client-id: ${{ secrets.CSOH_CI_CLIENT_ID }}
          private-key: ${{ secrets.CSOH_CI_PRIVATE_KEY }}

      # App-authenticated full clone. fetch-depth: 0 = no shallow clone, so
      # `git diff` and `git log` see full history (needed for the
      # diff-against-original-SHA checks below).
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      # Remember the commit SHA we started from. Later steps push new commits
      # and we want to compare against THIS sha (not HEAD) to know what the
      # original push actually changed.
      - name: Save original commit SHA
        id: original_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Install Python — most of the housekeeping scripts are Python.
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.x'

      # Install Playwright + Pillow (used by generate_preview.py to capture
      # and resize screenshots) plus a headless Chromium binary.
      # Pinned versions: bump deliberately when needed rather than picking
      # up whatever PyPI happens to ship today (supply-chain reproducibility).
      - name: Install dependencies
        run: |
          pip install 'playwright==1.59.0' 'Pillow==12.2.0'
          playwright install chromium

      # --- SRI hashes are always updated and committed BEFORE any deploy step ---
      # SRI = Subresource Integrity. Each <script> and <link rel="stylesheet">
      # tag carries a sha384 hash of the file it loads; browsers refuse to
      # execute the file if the hash mismatches. We recompute these hashes
      # whenever style.css or main.js changes, otherwise the page breaks.
      - name: Update SRI hashes in HTML files (MUST RUN BEFORE DEPLOY)
        id: sri
        run: |
          python3 update_sri.py
          # `git diff --quiet` exits 0 if there's nothing changed, 1 if there is.
          if git diff --quiet; then
            # Set a step output so later steps can ask "did SRI change?"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No SRI changes to commit"
          else
            # Configure git as the bot identity, then commit & push.
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            # `*.html` is shell-globbed by git itself; commit ONLY HTML files.
            git add '*.html'
            # `[skip ci]` in a commit message tells GitHub Actions NOT to
            # trigger workflows on this commit — avoids a deploy loop.
            git commit -m "chore: update SRI hashes for CSS/JS files [skip ci]"
            # If push fails (race with another deploy-pipeline run), pull
            # with rebase and retry. See file header for context.
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "SRI changes committed"
          fi

      # Validate every URL in our HTML against safety lists. We block the
      # whole deploy if anything unsafe slipped through — this is the
      # deploy-time equivalent of the per-PR check.
      - name: Check URL safety (must pass before normalization)
        id: url_safety
        run: |
          python3 tools/check_all_site_urls.py > url-safety-report.txt 2>&1 || true
          cat url-safety-report.txt
          if grep -q "❌ UNSAFE" url-safety-report.txt; then
            # `::error::` makes GitHub Actions render this as a red error
            # annotation in the run summary.
            echo "::error::Unsafe URLs detected — blocking normalization and deploy"
            echo "safe=false" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "safe=true" >> "$GITHUB_OUTPUT"
          fi

      # Save the safety report so reviewers can read it. `if: always()` =
      # upload even if the previous step failed (that's exactly when we
      # most want the report).
      - name: Upload safety report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: deploy-url-safety-report
          path: url-safety-report.txt
          retention-days: 30
          if-no-files-found: warn

      # Strip tracking params and resolve redirects on every URL. Same logic
      # as the standalone normalize-urls workflow, but runs inline so changes
      # ride along with the same deploy instead of opening a PR.
      - name: Normalize URLs (strip tracking params, resolve redirects)
        id: normalize
        run: |
          # `tee` writes output to a file AND prints it. PIPESTATUS[0] is
          # the exit code of the FIRST command in the pipe (Python), not tee.
          python3 tools/normalize_urls.py --apply 2>&1 | tee normalize-output.txt
          NORM_EXIT=${PIPESTATUS[0]}
          # Exit code 2 from normalize_urls.py = a redirect went to an
          # unsafe destination. Don't deploy; surface as a hard error.
          if [ "$NORM_EXIT" -eq 2 ]; then
            echo "::error::Normalization detected redirects to unsafe destinations — blocking deploy"
            exit 1
          fi
          # Other nonzero exits are warnings (couldn't resolve some URLs);
          # `::warning::` shows them as yellow annotations but doesn't fail.
          if [ "$NORM_EXIT" -ne 0 ]; then
            echo "::warning::URL normalization exited with code $NORM_EXIT — some redirects may not have been resolved"
          fi
          # Scope the diff check to HTML files only — other steps (URL safety)
          # may leave report files modified, but we only want to commit HTML
          # changes here. Without this scope, an empty `git add '*.html'`
          # followed by `git commit` fails under `bash -e` and blocks deploy.
          if git diff --quiet -- '*.html'; then
            echo "No URL changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add '*.html'
            git commit -m "chore: normalize URLs (tracking params, redirects) [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # presentations.html embeds JSON-LD VideoObject schema for each YouTube
      # talk. This script regenerates that block from the cards on the page,
      # so when you add a presentation the schema follows automatically.
      - name: Refresh presentations VideoObject schema
        id: presentations_schema
        run: |
          python3 tools/update_presentations_schema.py
          # Only commit if presentations.html actually changed.
          if git diff --quiet -- presentations.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No presentations schema changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add presentations.html
            git commit -m "chore: refresh presentations VideoObject schema [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Presentations schema changes committed"
          fi

      # Rebuild the meetings full-text search index. The meetings.html
      # search input lazily fetches /meetings-search-index.json so users
      # can match against the FULL recap body (speakers, topics buried in
      # the prose) and not just the card summaries.
      - name: Rebuild meetings search index
        id: meetings_search
        run: |
          python3 tools/build_meetings_search_index.py
          if git diff --quiet -- meetings-search-index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No meetings search index changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add meetings-search-index.json
            git commit -m "chore: rebuild meetings search index [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Meetings search index changes committed"
          fi

      # Refresh the <lastmod> dates in sitemap.xml from each file's git
      # commit date. Search engines use these to decide what to re-crawl.
      - name: Refresh sitemap lastmod dates
        id: sitemap
        run: |
          python3 tools/update_sitemap.py
          if git diff --quiet -- sitemap.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No sitemap changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sitemap.xml
            git commit -m "chore: refresh sitemap lastmod dates [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Sitemap changes committed"
          fi

      # Look for resource cards on the site that don't yet have a preview
      # screenshot. Sets a step output so the next two steps know whether
      # to actually generate them.
      - name: Check for missing previews
        id: check_previews
        run: |
          # `|| true` — don't fail this step if the script exits nonzero;
          # we just want the report to grep.
          python3 tools/generate_preview.py --check > preview-check.txt || true
          if grep -q "Found.*resources without previews" preview-check.txt; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Found resources without previews"
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "All resources have previews"
          fi
          cat preview-check.txt

      # Headless-Chromium screenshot every URL that's missing a preview.
      # Conditional — only runs if the previous step found something missing.
      - name: Generate missing previews
        if: steps.check_previews.outputs.missing == 'true'
        run: |
          python3 tools/generate_preview.py --batch-auto

      # Squeeze the new JPGs (strip metadata, recompress at quality 85).
      # Saves a noticeable amount of bandwidth on the live site.
      - name: Optimize images
        if: steps.check_previews.outputs.missing == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y jpegoptim
          # `find ... -exec`: run jpegoptim once per file. `\;` ends the
          # -exec command (not `\+` because we want one-at-a-time output).
          find img/previews -name "*.jpg" -exec jpegoptim --strip-all --max=85 {} \;

      # Always sync HTML <img src> paths to preview-mapping.json, even
      # when no new previews were generated this run — past contributors
      # (humans or the weekly Update Resources model) often type
      # made-up filenames into the HTML that drift from what the
      # screenshot generator actually writes to disk. This step is the
      # safety net that keeps them aligned.
      - name: Sync HTML preview paths to mapping
        run: |
          python3 tools/generate_preview.py --fix-html

      # Commit and push the new preview JPGs + the mapping file. We rely on
      # the credentials persisted by actions/checkout (which used the App
      # token) — same pattern as the SRI / sitemap / normalize steps above.
      # No need to embed the token in the remote URL.
      - name: Commit and push preview images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # `|| true` lets the step continue if there are no JPGs to add.
          git add img/previews/*.jpg || true
          git add preview-mapping.json || true
          # Also pick up any HTML rewrites from the --fix-html step.
          git add resources.html ctfs.html threat-research.html conferences.html cloud-security-reading-list.html || true
          # `git diff --cached --quiet` checks the staging area: nothing to
          # commit means we just exit cleanly.
          if git diff --cached --quiet; then
            echo "No preview-related changes to commit"
          else
            git commit -m "chore: auto-generate preview images and sync HTML paths [skip ci]"
            git push || (git pull --rebase origin main && git push)
          fi
