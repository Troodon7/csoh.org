# =============================================================================
# Build, scan, and deploy to GCP Cloud Run
# -----------------------------------------------------------------------------
# Path:  GitHub Actions → WIF (no SA key) → impersonate csoh-deployer →
#        build container → Trivy scan → push to Artifact Registry with
#        SLSA provenance → deploy Cloud Run revision behind LB.
#
# This runs in parallel with the existing FTP deploy. Once Cloudflare DNS
# is cut over to the GCP LB, the FTP path can be retired.
# =============================================================================

name: GCP — Build, Scan, and Deploy

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - 'chat-screenshots/**'
      - 'img/**'
      - 'style.css'
      - 'main.js'
      - 'chat-resources.js'
      - 'breach-timeline.css'
      - 'breach-timeline.js'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.github/workflows/gcp-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for WIF OIDC token

concurrency:
  group: gcp-deploy
  cancel-in-progress: true

env:
  PROJECT_ID: csoh-org-495800
  REGION: us-central1
  SERVICE: csoh-site
  REPO: csoh-containers
  IMAGE_NAME: csoh-site
  URL_MAP: csoh-urlmap

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    # The `production` environment is configured in repo Settings → Environments
    # to gate deploys: only the `main` branch can deploy to it, and (optionally)
    # required reviewers must approve. This means a malicious PR from a fork
    # cannot trigger a deploy even if it could otherwise mint an OIDC token,
    # because protected-environment secrets/conditions only apply on main.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Authenticate to GCP via WIF
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3
        with:
          workload_identity_provider: projects/23727240440/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: csoh-deployer@csoh-org-495800.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Configure docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: tag
        run: |
          # Single immutable SHA-based tag. We do NOT push :latest because
          # the Artifact Registry repo has immutable_tags=true — re-pushing
          # a tag is rejected, which is exactly what we want for supply-
          # chain integrity. The Cloud Run revision pins the SHA tag, so
          # `latest` would be redundant anyway.
          SHA="${GITHUB_SHA::12}"
          REF="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}"
          echo "image=${REF}:${SHA}" >> "$GITHUB_OUTPUT"

      # Build the Pagefind search index from the static HTML before Docker
      # picks up the build context. Pagefind crawls every .html file in the
      # site root, extracts the body text (scoped to <main> via
      # --root-selector), and writes a binary index + UI assets to
      # ./_pagefind/. The Dockerfile's `COPY . /usr/share/nginx/html/`
      # then carries the index into the image.
      #
      # GitHub-hosted ubuntu-latest ships Node 20+, so `npx` works without
      # an explicit setup-node step. We pin the Pagefind version so a
      # surprise major release can't break the deploy mid-stream.
      - name: Build Pagefind search index
        run: |
          set -euo pipefail
          npx -y pagefind@1.4.0 \
            --site . \
            --output-path ./_pagefind \
            --root-selector main \
            --exclude-selectors "header, footer, nav.breadcrumb-nav, .skip-link, script, style"
          # Sanity-check that the index actually produced files. If
          # Pagefind silently no-op'd, we'd rather fail the deploy here
          # than ship a broken /search.html.
          test -f ./_pagefind/pagefind.js
          test -f ./_pagefind/pagefind-ui.js
          test -f ./_pagefind/pagefind-ui.css
          echo "Pagefind index built. Top-level files:"
          find ./_pagefind -maxdepth 1 -type f -printf "%p\n" | head -20

      - name: Build container image
        run: |
          docker build \
            --tag "${{ steps.tag.outputs.image }}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      # Trivy scan — fail the build on HIGH/CRITICAL vulns. The base image
      # is digest-pinned, so this mostly catches new CVE disclosures against
      # the pinned base. We invoke the Trivy CLI directly rather than the
      # `aquasecurity/trivy-action` wrapper because that wrapper has a
      # transitive dependency on `aquasecurity/setup-trivy@v0.2.2` which
      # has been yanked from the Marketplace, breaking action resolution.
      - name: Install Trivy
        run: |
          # Pinned download from Aqua's GitHub releases + SHA-256 verify.
          #
          # Why pin instead of `apt install trivy` from Aqua's repo: the
          # apt repo serves whatever Trivy version Aqua last published —
          # works in practice, but it means every CI run pulls a different
          # scanner binary as new releases ship, with no record in this
          # repo of which scanner actually ran. Hardcoding version +
          # checksum here gives us supply-chain reproducibility (today's
          # CI run uses the exact same scanner code as last week's), and
          # any tampering with the download fails the sha256sum check.
          #
          # To bump: pick a new version from
          #   https://github.com/aquasecurity/trivy/releases
          # and copy the matching SHA from the release's checksums.txt
          # (also available as a `*.sigstore.json` signed attestation).
          set -euo pipefail
          TRIVY_VERSION="0.70.0"
          TRIVY_SHA256="8b4376d5d6befe5c24d503f10ff136d9e0c49f9127a4279fd110b727929a5aa9"
          curl -fsSL -o /tmp/trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  /tmp/trivy.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          rm /tmp/trivy.tar.gz
          trivy --version

      - name: Trivy scan (fail on HIGH/CRITICAL)
        run: |
          trivy image \
            --exit-code 1 \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format table \
            --no-progress \
            "${{ steps.tag.outputs.image }}"

      # Artifact Registry has immutable_tags=true (a supply-chain control —
      # see Layer 5 of cloud-deployment.html), so re-pushing a tag fails.
      # That's the desired behavior for tampering, but it makes a workflow
      # rerun impossible whenever an earlier run pushed the image and then
      # failed at a later step (e.g. deploy or CDN invalidate). We make
      # push idempotent by checking AR first; the locally-built image was
      # already Trivy-scanned this run, and the AR image was scanned on
      # the original run, so either way the deployed bytes are scanned.
      - name: Push container image (skip if already in registry)
        run: |
          set -euo pipefail
          if gcloud artifacts docker images describe "${{ steps.tag.outputs.image }}" --quiet >/dev/null 2>&1; then
            echo "Image already exists in Artifact Registry — skipping push (idempotent rerun)."
          else
            docker push "${{ steps.tag.outputs.image }}"
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --project "${{ env.PROJECT_ID }}" \
            --region "${{ env.REGION }}" \
            --image "${{ steps.tag.outputs.image }}" \
            --platform managed \
            --ingress internal-and-cloud-load-balancing \
            --service-account "csoh-run-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --quiet

      # Cloud CDN at the GCLB caches responses per the origin's
      # Cache-Control header (max-age=3600 from nginx). After a deploy,
      # the new Cloud Run revision is live but Cloud CDN keeps serving
      # the previously-cached bytes until the TTL expires — readers see
      # stale content for up to an hour, and a Cloudflare cache purge
      # cannot reach into Cloud CDN. Invalidate "/*" so the very next
      # request through the load balancer fetches the new revision.
      # We omit `--async` so the workflow waits for propagation; that
      # makes "deploy job succeeded" mean "the change is actually live."
      - name: Invalidate Cloud CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache "${{ env.URL_MAP }}" \
            --project "${{ env.PROJECT_ID }}" \
            --path "/*"

      - name: Show deployed revision
        run: |
          gcloud run services describe "${{ env.SERVICE }}" \
            --project "${{ env.PROJECT_ID }}" \
            --region "${{ env.REGION }}" \
            --format='value(status.latestReadyRevisionName,status.url)'
