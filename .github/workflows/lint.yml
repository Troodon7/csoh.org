# =============================================================================
# Lint
# -----------------------------------------------------------------------------
# Quality gate for code & GitHub Actions on every push and PR. Three checks:
#
#   1. actionlint  — workflow syntax + shellcheck on inline `run:` blocks.
#                    Catches things like unquoted variables, typo'd `uses:`
#                    versions, bad `if:` expressions BEFORE we ship.
#   2. ruff        — Python lint on the .py housekeeping scripts. Catches
#                    real bugs (unused imports, undefined names, bare
#                    `except`) without nitpicking on style.
#   3. yamllint    — structural sanity on every YAML file with a config that's
#                    relaxed for GitHub Actions quirks (see .yamllint.yml).
#
# All three are fast (<30s combined). They run as parallel jobs so failures
# in one check don't hide failures in the others — you see everything at once.
# Read-only on the repo; never modifies code, never posts comments.
# =============================================================================

name: Lint

# -----------------------------------------------------------------------------
# §1 — Triggers (matches "Anatomy / §1" on github-actions.html)
# -----------------------------------------------------------------------------
on:
  # Lint every PR — this is the quality gate for incoming changes.
  pull_request:
  # Lint pushes to main as a safety net for direct commits that bypass PRs.
  push:
    branches:
      - main
  # Manual run from the Actions tab.
  workflow_dispatch:

# -----------------------------------------------------------------------------
# §2 — Permissions
# Read-only. The lint job never writes to the repo or posts comments.
# -----------------------------------------------------------------------------
permissions:
  contents: read

# -----------------------------------------------------------------------------
# §3 — Concurrency
# Per-ref lock so a new push to the same PR cancels the in-flight lint run.
# Different PRs lint in parallel.
# -----------------------------------------------------------------------------
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

# -----------------------------------------------------------------------------
# §4 — Jobs and steps
# Three independent jobs running in parallel. Each fails the workflow on its
# own — we don't want a Python lint failure to mask a workflow lint failure.
# -----------------------------------------------------------------------------
jobs:
  # -------------------------------------------------------------------------
  # actionlint — checks .github/workflows/*.yml for syntax issues, bad
  # `uses:` references, malformed `if:` expressions, and (via the bundled
  # shellcheck) shell issues inside `run:` blocks like unquoted variables.
  # -------------------------------------------------------------------------
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # raven-actions/actionlint bundles actionlint + shellcheck and emits
      # GitHub Actions error annotations so failures show up inline on PRs.
      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2.1.2
        with:
          fail-on-error: true

  # -------------------------------------------------------------------------
  # ruff — Python linter. Config lives in pyproject.toml. We use the default
  # rule set (E + F + W): catches real bugs without surfacing style nits.
  # -------------------------------------------------------------------------
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run ruff
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0

  # -------------------------------------------------------------------------
  # yamllint — structural lint for every YAML file. Config in .yamllint.yml
  # disables the rules that don't fit GitHub Actions YAML (line-length,
  # truthy, document-start). Everything else stays at default.
  # -------------------------------------------------------------------------
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # yamllint is on PyPI; pip-install rather than pulling a third-party
      # action so we keep the supply-chain surface small.
      - name: Install yamllint
        run: pip install yamllint==1.38.0

      - name: Run yamllint
        run: yamllint .
