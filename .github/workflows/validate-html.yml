# =============================================================================
# Validate HTML
# -----------------------------------------------------------------------------
# Runs the W3C HTML5 validator against every .html file in the repo. Catches
# stuff like unclosed tags, anchors nested inside buttons, or invalid attribute
# values BEFORE they ship. Fails the PR if anything is broken and posts a
# comment showing what to fix.
# =============================================================================

name: Validate HTML

# When does this workflow run?
on:
  # On every pull request that touches an HTML file (skip PRs that only edit
  # CSS, scripts, or docs — no point re-validating then).
  pull_request:
    paths:
      - '**.html'
  # On every push to main that touches an HTML file — catches direct commits
  # that bypass the PR flow so we don't have to wait for the weekly cron.
  push:
    branches:
      - main
    paths:
      - '**.html'
  # Weekly safety net at 07:00 UTC every Monday — last line of defense for
  # anything that somehow slipped past both PR and push triggers.
  schedule:
    - cron: '0 7 * * 1'   # cron format: min hour day-of-month month day-of-week
  # Lets you run the workflow manually from the Actions tab in GitHub.
  workflow_dispatch:

# What this workflow is allowed to do.
# `contents: read` = can read repo files. `pull-requests: write` = can post
# review comments. Read-only on the codebase — safer than the default.
permissions:
  contents: read
  pull-requests: write


# Concurrency = "don't let two of these run at the same time."
# `group` is the lock name; same group + same ref = queued/cancelled.
# `${{ github.ref }}` makes the lock per-branch/per-PR, so different PRs
# can validate in parallel — only the SAME PR cancels its old run.
# `cancel-in-progress: true` = if you push a new commit to a PR, kill the
# old validation run and start fresh on the latest commit. Read-only checks
# are safe to interrupt.
concurrency:
  group: validate-html-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-html:
    # The VM image GitHub gives us. `ubuntu-latest` is the standard pick.
    runs-on: ubuntu-latest

    steps:
      # Step 1: pull the repo onto the runner so we can read the files.
      # The pinned SHA (instead of @v6) is a security best practice — it
      # prevents a compromised tag from running malicious code on our runner.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Step 2: actually validate. This action wraps the Nu HTML Checker
      # (the same engine validator.w3.org uses).
      - name: Validate HTML5
        uses: Cyb3r-Jak3/html5validator-action@443b108eb8e134b63a1f8a8ba0c942d552608ed7  # master 2025-09-19
        with:
          root: .                                       # scan the whole repo
          # Skip files we don't want validated. The Google verification stub
          # is intentionally non-standard HTML — Google requires it as-is.
          blacklist: google66d489593949bd4c.html

      # Step 3: stash the validation log as an artifact you can download from
      # the GitHub run page. `if: always()` = run even if the previous step
      # failed, so we still get the log when it's most useful.
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: html-validation-log
          path: log.log
          retention-days: 30                            # auto-delete after 30 days
          if-no-files-found: warn

      # Step 4: if validation failed AND this is a PR, post the errors as
      # a comment so the contributor sees them without digging through logs.
      - name: Comment on PR with validation results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          # Inline JS that runs against GitHub's API. `github`, `context`, etc.
          # are pre-injected helpers from the github-script action.
          script: |
            const fs = require('fs');
            let log = '';
            try {
              log = fs.readFileSync('log.log', 'utf8');
            } catch (e) {
              log = 'Error reading validation log';
            }

            // Trim the log to the last 50 lines so the PR comment doesn't
            // become an unreadable wall of text.
            const lines = log.split('\n');
            const trimmed = lines.length > 50
              ? '...(truncated)\n' + lines.slice(-50).join('\n')
              : log;

            const errorCount = (log.match(/error:/gi) || []).length;

            let comment = `## :x: HTML Validation Failed\n\n`;
            comment += `Found **${errorCount} validation error(s)** in HTML files.\n\n`;
            comment += `\`\`\`\n${trimmed}\n\`\`\`\n\n`;
            comment += `Fix the errors above and push again. Full log in workflow artifacts.`;

            // Post the comment on the PR.
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
