# =============================================================================
# Check Broken Links
# -----------------------------------------------------------------------------
# Crawls every link in our HTML files (using lychee) and reports any that 404,
# DNS-fail, or otherwise rot. Runs on PRs that touch HTML, weekly to catch
# external link rot, and on demand. Posts a comment on PRs when problems are
# found, but never fails — link rot is everywhere and shouldn't block merges.
# =============================================================================

name: Check Broken Links

on:
  # Validate links on any PR that touches an HTML file.
  pull_request:
    paths:
      - '**.html'
  # Weekly external-link recheck — Mondays at 06:00 UTC. External sites die
  # on their own schedule; this catches it without us having to think about it.
  schedule:
    - cron: '0 6 * * 1'    # min hour day-of-month month day-of-week
  # Manual trigger from the GitHub Actions tab.
  workflow_dispatch:

# Read-only on the repo, can post PR comments. We never modify code here.
permissions:
  contents: read
  pull-requests: write


# Per-ref concurrency: a new push to the same PR cancels the old run.
# Read-only — safe to interrupt mid-crawl.
concurrency:
  group: check-broken-links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      # Pull the repo onto the runner.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Restore lychee's HTTP cache from a previous run. Massively speeds up
      # the crawl — lychee skips URLs it already validated within the cache TTL.
      # Cache key includes the SHA so each commit can build on the prior cache.
      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-                   # fall back to any cache

      # Run the actual link checker. Lychee is a fast, parallel link crawler.
      # We pass it a `.lychee.toml` config in the repo root for things like
      # ignore-lists, retry rules, and headers.
      - name: Check for broken links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          # `>-` is YAML's "fold this multi-line string into one line."
          # CLI flags below: --cache reuses the cache restored above;
          # --max-cache-age 3d treats results <3 days old as still good;
          # --max-concurrency 20 hits servers in parallel (be polite);
          # --glob-ignore-case so we catch HTML/Html/HTM equally.
          args: >-
            --config .lychee.toml
            --cache
            --max-cache-age 3d
            --verbose
            --no-progress
            --max-concurrency 20
            --glob-ignore-case
            './*.html'
          output: ./lychee-report.md
          format: markdown
          fail: false                                   # never fail the job — see header

      # Save the report so reviewers can download the full crawl.
      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: broken-links-report
          path: ./lychee-report.md
          retention-days: 30
          if-no-files-found: warn

      # Quick scan: did lychee find errors? Sets a step output we use below.
      # `[Errors]` is the section header lychee prints when something is broken.
      - name: Check for broken links in report
        id: report
        if: github.event_name == 'pull_request'
        run: |
          if [ -f ./lychee-report.md ] && grep -qE '\[Errors\]' ./lychee-report.md; then
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
          fi

      # If we found errors AND we're on a PR, post a summary comment.
      - name: Comment on PR with broken links
        if: steps.report.outputs.has_errors == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('./lychee-report.md', 'utf8');
            } catch (e) {
              report = 'Error reading link check report';
            }

            // PR comments have a 65,536-char hard limit. Truncate at 60k to
            // leave headroom for the wrapper formatting we add below.
            if (report.length > 60000) {
              report = report.substring(0, 60000) + '\n\n...(truncated, see artifacts for full report)';
            }

            let comment = `## :warning: Broken Links Detected\n\n`;
            comment += report;
            comment += `\n\n---\nFull report available in workflow artifacts.`;

            // Post the comment on the PR.
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
